<!DOCTYPE html>
<html lang="en" data-theme="light" data-accent="rose">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fbf7f8">
  <title>Ortiz Us OS</title>
  <meta name="description" content="Chris & Kat's 2-2-2 app — date nights, getaways, and trips, kept on rhythm.">

  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icons/icon.svg">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <span class="wordmark">
        <svg class="mark" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20.5C7 17 3.5 13.8 3.5 9.8 3.5 7 5.6 5 8.2 5c1.7 0 3.1.9 3.8 2.2C12.7 5.9 14.1 5 15.8 5c2.6 0 4.7 2 4.7 4.8 0 4-3.5 7.2-8.5 10.7z"/></svg>
        Us&nbsp;OS
      </span>
      <button id="settings-btn" class="icon-btn" aria-label="Settings" title="Settings">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M12 3.5v2M12 18.5v2M3.5 12h2M18.5 12h2M6 6l1.4 1.4M16.6 16.6 18 18M18 6l-1.4 1.4M7.4 16.6 6 18"/></svg>
      </button>
    </header>

    <main id="view"></main>

    <nav class="tabbar">
      <button class="tab active" data-tab="rhythm"><svg viewBox="0 0 24 24"><path d="M12 20.5C7 17 3.5 13.8 3.5 9.8 3.5 7 5.6 5 8.2 5c1.7 0 3.1.9 3.8 2.2C12.7 5.9 14.1 5 15.8 5c2.6 0 4.7 2 4.7 4.8 0 4-3.5 7.2-8.5 10.7z"/></svg><span>Rhythm</span></button>
      <button class="tab" data-tab="ideas"><svg viewBox="0 0 24 24"><path d="M9 18h6M10 21h4M12 3a6 6 0 0 1 3.5 10.9c-.6.5-.9 1-1 1.6H9.5c-.1-.6-.4-1.1-1-1.6A6 6 0 0 1 12 3z"/></svg><span>Ideas</span></button>
      <button class="tab" data-tab="goals"><svg viewBox="0 0 24 24"><path d="M5 21V4"/><path d="M5 4h13l-2.5 4L18 12H5"/></svg><span>Goals</span></button>
      <button class="tab" data-tab="history"><svg viewBox="0 0 24 24"><path d="M3.5 12a8.5 8.5 0 1 0 2.5-6"/><path d="M6 3v3.5H9.5"/><path d="M12 8v4.5l3 1.7"/></svg><span>History</span></button>
    </nav>
  </div>
  <script type="module" src="./app.js"></script>
</body>
</html>
